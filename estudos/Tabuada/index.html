  <body>
    <header>
      <h1>Tabuada</h1>
    </header>
    <section>
      <div id="dados">
        <p>
        <label for="multiplicando">Tabuada do número:</label>
        <input type="number" name="multiplicando" id="multiplicando" />
        </p>
        <label for="inicio">Começa em:</label>
        <input type="number" name="inicio" id="inicio" />
        <label for="final">Termina em:</label>
        <input type="number" name="final" id="final" />
        <button onclick="multiplicar()" type="submit">Multiplicar</button>
      </div>
      <div id="res">
        <select name="resultado" id="resultado">
          <option value="v0">Digite as informações acima!</option>
        </select>
      </div>
    </section>
